<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       div{
        margin: 10px;
       }
        .block{
            background-color: #199bf2;
            width: 100px;
            height: 100px;
        }
        .block1{
            background-color: #53778f;
            width: 100px;
            height: 100px;
        }
        .block2{
            background-color: #232f36;
            width: 100px;
            height: 100px;
        }
        .block:hover{
           transform: translate(50px, 50px);
           /* translate : digunakan untuk menggeser posisi elemen dari posisi aslinya 
           transform: translate(x, y);
           x → geser ke kanan (+) atau kiri (-)
           y → geser ke bawah (+) atau atas (-)
           */
        }
        .block1:hover{
            transform: translate(-30px, -30px);
        }
        .block2:hover{
            transform: translate(30px, -30px);
        }
    </style>
</head>
<body>
    <div class="block"></div>
    <div class="block1"></div>
    <div class="block2"></div>
</body>
</html>
