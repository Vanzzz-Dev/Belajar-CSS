<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .container1{
            display: flex;
            border: 2px solid;
            height: 150px;
            flex-direction: row;
            align-items: center;
            justify-content: center;
        }
        .container2{
            display: flex;
            border: 2px solid;
            height: 150px;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
      .item {
        width: 60px;
        height: 60px;
        color: white;
        font-weight: bold;
      }
      .item:nth-child(1) {
        background: red;
      }
      .item:nth-child(2) {
        background: orange;
      }
      .item:nth-child(3) {
        background: green;
      }
      .item:nth-child(4) {
        background: blue;
      }
      .item:nth-child(5) {
        background: purple;
      }
    </style>
  </head>
  <body>
    <div class="container1">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
    </div>
    <div class="container2">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
    </div>
    <div class="container3">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
    </div>
  </body>
</html>
