<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
        flex-direction  :Menentukan arah susunan item di dalam flex container.
        flex-wrap       :Mengatur apakah item boleh pindah ke baris baru atau tidak.
        justify-content :Mengatur posisi item secara horizontal
        align-items     :Mengatur posisi item secara vertikal
        align-self      :Mengatur posisi satu item saja
        align-content   :Mengatur jarak antar baris (Hanya bekerja kalau flex-wrap: wrap) 
        */
        .container{
            border: 2px solid;
            height: 300px;
            display: flex;
            flex-direction:  row;   /* row (default), row-reverse,  column, column-reverse */
            flex-wrap: wrap;  /* nowrap (default), wrap, wrap-reverse*/
            justify-content: space-around;   /* flex-start(default),flex-end,center,space-around, space-between,space-evenly*/
            align-items: center;
        }
        .kotak{
            width: 90px;
            height: 90px;
            background-color: rgb(75, 159, 152);
            margin: 5px;
            color: #fff;
        }

    </style>
</head>
<body>
   <div class="container">
    <div class="kotak">1</div>
    <div class="kotak">2</div>
    <div class="kotak">3</div>
    <div class="kotak">4</div>
    <div class="kotak">5</div>
</div>
<br><br><br>
<img style="width: 100%;"  src="img.png" alt="">
</body>
</html>
