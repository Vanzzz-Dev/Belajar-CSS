<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        border: 2px solid;
        height: 500px;
        display: grid;
        grid-template-columns: 100px 100px 100px;
        grid-template-rows: 100px 100px 100px;
        gap: 5px;
        align-items: center;
        justify-items: center;
        align-content: center;
        justify-content: center;
      }
      .kotak {
        width: 70px;
        height: 70px;
        border: 2px solid rgba(50, 39, 39, 0.089);
      }
      span {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 70px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="kotak"><span>1</span></div>
      <div class="kotak"><span>2</span></div>
      <div class="kotak"><span>3</span></div>
      <div class="kotak"><span>4</span></div>
      <div class="kotak"><span>5</span></div>
      <div class="kotak"><span>6</span></div>
      <div class="kotak"><span>7</span></div>
      <div class="kotak"><span>8</span></div>
      <div class="kotak"><span>9</span></div>
    </div>

    <img src="img.png" alt="" width="100%">
  </body>
</html>
